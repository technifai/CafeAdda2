<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cafe Adda Admin</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginBox">
  <h2>Admin Login</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div id="adminPanel" style="display:none;">

  <h2>Create Category</h2>
  <input id="categoryName" placeholder="Category Name">
  <button onclick="addCategory()">Add</button>
  <div id="categoryList"></div>

  <hr>

  <h2>Add Item</h2>
  <input id="itemName" placeholder="Item Name">
  <input id="itemPrice" type="number" placeholder="Price">
  <select id="categorySelect"></select>

  <label>
    <input type="checkbox" id="itemBest"> Bestseller
  </label>

  <label>
    <input type="checkbox" id="itemActive" checked> Active
  </label>

  <button onclick="addItem()">Add Item</button>

  <h3>Menu Items</h3>
  <div id="menuList"></div>

  <hr>

  <h2>Create Combo</h2>
  <input id="comboName" placeholder="Combo Name">
  <input id="comboPrice" type="number" placeholder="Combo Price">
  <div id="comboItemsSelection"></div>

  <label>
    <input type="checkbox" id="comboActive" checked> Active
  </label>

  <button onclick="addCombo()">Add Combo</button>

  <h3>Combos</h3>
  <div id="comboList"></div>

</div>

<script src="firebase-config.js"></script>
<script src="admin.js"></script>

</body>
</html>
